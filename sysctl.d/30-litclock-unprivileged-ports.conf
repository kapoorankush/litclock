# LitClock (#343) — let the `pi` service account bind port 80 without root.
#
# control_server (litclock-control.service) runs as User=pi and serves the
# Control PWA on port 80 so a recipient never types a port (bare
# http://litclock.local / http://<ip>). Port 80 is normally privileged
# (< 1024), so a non-root process can't bind it.
#
# Lowering ip_unprivileged_port_start to 80 lets any non-root process bind
# ports >= 80. This is deliberately chosen over AmbientCapabilities=CAP_NET_BIND_SERVICE:
# the litclock-control unit runs NoNewPrivileges=no + setuid `sudo` (for the
# reboot/poweroff system actions), and adding a capability directive to a
# User=pi unit has repeatedly flipped the kernel NoNewPrivs bit on this
# hardware and broken setuid sudo. A sysctl never touches that wiring. On a
# single-purpose appliance with one service account the system-wide floor
# drop is harmless (there is no second user to protect from).
#
# Applied at boot by systemd-sysctl.service (sysinit.target), which orders
# before litclock-control.service (After=sysinit.target). update.sh installs
# and applies it live for in-place upgrades from < v0.218.0.
net.ipv4.ip_unprivileged_port_start = 80
