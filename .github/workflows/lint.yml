name: Lint

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  ruff:
    name: Python lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/ruff-action@v3
        with:
          args: check src/ image-gen/ scripts/

  shellcheck:
    name: Shell lint (shellcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run shellcheck
        # `find ... -print0 | xargs -0` is robust to tree shape changes —
        # the prior bash glob `pi-gen/stage3/**/**/*.sh` silently broke when
        # the only 3-level shell file (pi-gen/stage3/02-configure-system/
        # files/wifi-watchdog.sh) was promoted to scripts/ during M5.
        # Without `nullglob` set, the unmatched glob was passed literally
        # to shellcheck which failed with "openBinaryFile: does not exist".
        run: |
          find scripts pi-gen docs/manual -name '*.sh' -type f -print0 \
            | xargs -0 shellcheck --severity=warning

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          pip install -r requirements.txt -r requirements-dev.txt
      - name: Run tests
        run: pytest

  pip-audit:
    name: Dependency audit (pip-audit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit dependencies
        run: pip-audit -r requirements.txt

  js-test:
    # JS unit tests for src/control_server/static/js/* via vitest + jsdom
    # (#338). Dev/CI only — never installed on the Pi. Runs in parallel with
    # ruff/shellcheck/pytest/pip-audit and shows as a separate required-check
    # on PRs. Branch protection is a separate manual repo setting; this job
    # being red won't server-side block merge until that toggle is flipped.
    name: Unit tests (vitest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm
      - name: Install JS dev dependencies
        run: npm ci
      - name: Run JS tests
        run: npm run test:js
