# LitClock — tmpfs runtime directory for the LKG render heartbeat + M5 update
# status file (/run/litclock/update.status, owned by pi). Also holds derived
# caches kept off the SD card: the weather response cache and the
# update-check GH-API cache (both #434).
#
# /run is tmpfs, so this directory is recreated on every boot and the files
# inside it are never written to the SD card. With a render every minute the
# heartbeat alone is ~525,600 writes/year that no longer hit flash.
#
# See systemd/litclock-lkg.service and src/literary_clock.py (HEARTBEAT_FILE).
d /run/litclock 0755 pi pi -

# M5 (#245) — persistent state directory. update.sh writes lkg-sha +
# update-failed + post-update-grace-until + wifi-watchdog-reboots here (the
# GH-API update-check cache moved to /run/litclock tmpfs in #434).
# Pre-M5 some installs left this dir root-owned (created ad-hoc via `sudo
# mkdir`); the line below normalises ownership on every boot via systemd-
# tmpfiles --create. Existing contents are preserved by the `d` directive.
# F5 in PLAN-LitClock-Control-PWA.md "Codex amendments" table.
d /var/lib/litclock 0755 pi pi -
