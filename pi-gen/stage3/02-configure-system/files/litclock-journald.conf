[Journal]
# Persistent storage so boot-time failures (hotspot creation, brcmfmac
# driver hangs, NetworkManager startup races) can be debugged across
# reboots. Volatile journals are wiped on every boot, which made it
# impossible to debug first-boot hotspot failures on real hardware
# (issue #172).
#
# Size-capped tightly to limit SD card wear: 64M total, 32M per boot,
# 7 day retention. This is more than enough to cover a first-boot
# failure investigation without writing gigabytes over the card's life.
Storage=persistent
SystemMaxUse=64M
SystemMaxFileSize=32M
MaxRetentionSec=7day
